<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work | Darsh B.</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            display: ['"Outfit"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          colors: { 
            bg: '#F8F9FA', 
            ink: '#0F172A',
          }
        }
      }
    }
  </script>

  <style>
    :root {
      --font-sans: "Plus Jakarta Sans", ui-sans-serif, system-ui, sans-serif;
      --font-display: "Outfit", ui-sans-serif, system-ui, sans-serif;
      --color-bg: #F8F9FA;
      --color-ink: #0F172A;
    }

    html { scroll-behavior: smooth; }
    
    body {
      background-color: var(--color-bg);
      color: var(--color-ink);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3, h4, h5, h6 { font-family: var(--font-display); }
    
    .bg-grid-pattern {
      background-size: 40px 40px;
      background-image: linear-gradient(to right, rgba(0, 0, 0, 0.03) 1px, transparent 1px),
                        linear-gradient(to bottom, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
      mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
      -webkit-mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
    }
    
    .nav-hidden { transform: translateY(-100px); opacity: 0; }
    .nav-visible {
      transform: translateY(0); opacity: 1;
      transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
    .reveal.active { opacity: 1; transform: translateY(0); }

    .project-card { transition: opacity 0.4s ease, transform 0.4s ease; }
    .project-card.hidden-filter { opacity: 0; transform: scale(0.95); pointer-events: none; position: absolute; visibility: hidden; }
    
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 8px; border: 2px solid var(--color-bg); }
    ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
  </style>
</head>
<body class="min-h-screen flex flex-col relative">

  <div class="fixed inset-0 bg-grid-pattern pointer-events-none z-[-1]"></div>

  <header id="navbar" class="fixed top-6 left-0 right-0 z-50 flex justify-center px-4 nav-hidden">
    <nav class="flex items-center justify-between w-full max-w-4xl px-3 py-2 bg-white/90 backdrop-blur-xl rounded-full shadow-sm border border-slate-200/80 transition-all hover:bg-white">
      <a href="index.html" class="text-xl font-bold tracking-tight hover:opacity-70 transition-opacity pl-4 text-slate-900 font-display">
        Darsh B<span class="text-indigo-600">.</span>
      </a>
      <ul id="nav-links" class="hidden md:flex items-center gap-2 text-sm font-semibold text-slate-500">
        <li><a href="work.html" class="px-4 py-2 rounded-full text-slate-900 bg-slate-100 font-bold transition-all relative block">Work</a></li>
        <li><a href="about.html" class="px-4 py-2 rounded-full hover:text-slate-900 hover:bg-slate-100 transition-all relative block">About</a></li>
        <li><a href="index.html#shop" class="px-4 py-2 rounded-full hover:text-slate-900 hover:bg-slate-100 transition-all relative block">Digital Shop</a></li>
      </ul>
      <a href="contact.html" class="px-6 py-2.5 text-sm font-bold text-white bg-slate-900 hover:bg-slate-800 rounded-full transition-all shadow-md shadow-slate-900/10 hover:shadow-lg hover:shadow-slate-900/20 hover:-translate-y-0.5">
        Start a Project
      </a>
    </nav>
  </header>

  <main class="flex-grow pt-32 pb-24 w-full relative z-10">
    <div class="px-6 md:px-12 lg:px-24 max-w-7xl mx-auto w-full pb-32">
      
      <div class="mb-20 reveal pt-8">
        <h1 class="text-5xl md:text-[6rem] font-bold tracking-tight mb-10 text-slate-900 leading-[1.1]">Selected Archive</h1>
      </div>

      <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 gap-10 md:gap-14 font-sans relative">
        </div>
      
    </div>
  </main>

  <footer class="py-24 px-6 md:px-12 lg:px-24 bg-white/80 backdrop-blur-md border-t border-slate-200/60 relative mt-16 z-10 overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-b from-transparent to-white/90 pointer-events-none"></div>
    <div class="max-w-7xl mx-auto flex flex-col items-center text-center relative z-10 reveal">
      <h2 class="text-5xl md:text-7xl font-bold tracking-tight mb-10 max-w-4xl leading-[1.05] text-slate-900">
        Let's build an <span class="text-indigo-600 italic font-display">intelligent</span> future.
      </h2>
      <a href="contact.html" class="group inline-flex items-center gap-3 px-8 py-4 text-lg font-bold text-white bg-slate-900 hover:bg-slate-800 rounded-full transition-all hover:-translate-y-1 shadow-lg hover:shadow-slate-900/20">
        Get in touch
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg>
      </a>
      <div class="w-full h-px bg-slate-200 my-20"></div>
      <div class="w-full flex flex-col md:flex-row justify-between items-center gap-6 text-base text-slate-500 font-medium">
        <p>© <span id="current-year"></span> Darsh B. All rights reserved.</p>
        <div class="flex items-center gap-8">
          <a href="mailto:hello@example.com" class="hover:text-indigo-600 transition-colors">hello@example.com</a>
          <a href="#" class="hover:text-indigo-600 transition-colors">LinkedIn</a>
          <a href="#" class="hover:text-indigo-600 transition-colors">X</a>
        </div>
      </div>
    </div>
  </footer>

  <script>
    // Reveal Animations
    function initScrollReveal() {
      const elements = document.querySelectorAll('.reveal');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('active');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });

      elements.forEach(el => observer.observe(el));
      setTimeout(() => {
        elements.forEach(el => {
          if (el.getBoundingClientRect().top < window.innerHeight) el.classList.add('active');
        });
      }, 100);
    }

    // Dynamic JSON Fetching Logic for Work Archive
    async function loadProjects() {
      try {
        const response = await fetch('projects.json');
        const projects = await response.json();
        const container = document.getElementById('portfolio-grid');
        
        let html = '';
        projects.forEach((project, index) => {
          // Recreate the staggered CSS classes (every other item shifts down)
          const isOdd = index % 2 !== 0;
          const translateClass = isOdd ? 'md:translate-y-12 lg:translate-y-16' : '';
          const delay = isOdd ? '100' : '0';
          
          const tagsHtml = project.tags.map(tag => 
            `<span class="px-4 py-1.5 text-[11px] font-bold uppercase tracking-widest bg-white border border-slate-200 shadow-sm rounded-full text-slate-500">${tag}</span>`
          ).join('');

          html += `
            <div class="project-card group cursor-pointer reveal h-full flex flex-col ${translateClass}" data-categories="${project.tags.join(',')}" style="transition-delay: ${delay}ms">
              <a href="project.html?id=${project.id}" class="flex-grow block bg-white p-4 rounded-[3rem] border border-slate-100 shadow-sm hover:shadow-xl transition-all duration-500 hover:-translate-y-2">
                <div class="overflow-hidden rounded-[2.5rem] mb-6 bg-slate-100 relative aspect-[4/3]">
                  <img src="${project.image}" alt="${project.title}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105" />
                  <div class="absolute inset-0 bg-slate-900/0 group-hover:bg-slate-900/5 transition-colors duration-500"></div>
                </div>
                <div class="px-5 pb-4 flex flex-col justify-between flex-grow">
                  <div>
                    <div class="flex gap-3 mb-4 flex-wrap">
                      ${tagsHtml}
                    </div>
                    <h3 class="text-3xl font-bold tracking-tight text-slate-900 group-hover:text-indigo-600 transition-colors">${project.title}</h3>
                    <p class="text-slate-500 mt-3 font-medium line-clamp-2">${project.description}</p>
                  </div>
                </div>
              </a>
            </div>
          `;
        });
        
        container.innerHTML = html;
        
        // Initialize animations after DOM is built
        initScrollReveal();
        
      } catch (error) {
        console.error('Failed to load projects:', error);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('current-year').textContent = new Date().getFullYear();
      setTimeout(() => {
        const nav = document.getElementById('navbar');
        nav.classList.remove('nav-hidden'); 
        nav.classList.add('nav-visible');
      }, 100);
      
      // Load projects from JSON
      loadProjects();
    });
  </script>
</body>
</html>
