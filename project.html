  <script>
    function initScrollReveal() {
      const elements = document.querySelectorAll('.reveal');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('active');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });

      elements.forEach(el => observer.observe(el));
      setTimeout(() => {
        elements.forEach(el => {
          if (el.getBoundingClientRect().top < window.innerHeight) el.classList.add('active');
        });
      }, 100);
    }

    async function loadProjectDetails() {
      // Get the ?id= parameter from the URL
      const urlParams = new URLSearchParams(window.location.search);
      const projectId = urlParams.get('id');

      // If no ID is provided, redirect back to the work page
      if (!projectId) {
        window.location.href = 'work.html';
        return;
      }

      try {
        const response = await fetch('projects.json');
        const projects = await response.json();

        // Find the specific project matching the URL ID
        const project = projects.find(p => p.id === projectId);

        if (!project) {
          document.getElementById('project-title').textContent = "Project Not Found";
          document.getElementById('project-description').textContent = "The project you are looking for does not exist.";
          return;
        }

        // Update the DOM elements with the JSON data
        document.getElementById('doc-title').textContent = `${project.title} | Darsh B.`;
        document.getElementById('project-title').textContent = project.title;
        document.getElementById('project-description').textContent = project.description;

        const imageEl = document.getElementById('project-image');
        imageEl.src = project.image;
        imageEl.alt = `${project.title} Preview`;
        document.getElementById('project-link').href = project.url;
        // Generate and inject the tags
        const tagsHtml = project.tags.map(tag =>
          `<span class="px-5 py-2 text-xs font-bold uppercase tracking-widest bg-white border border-slate-200 rounded-full shadow-sm text-slate-600">${tag}</span>`
        ).join('');

        document.getElementById('project-tags').innerHTML = tagsHtml;

        // Initialize animations after data is loaded
        initScrollReveal();

      } catch (error) {
        console.error('Failed to load project details:', error);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {

        nav.classList.remove('nav-hidden');
        nav.classList.add('nav-visible');
      }, 100);

      // Load specific project details
      loadProjectDetails();
    });
  </script>
